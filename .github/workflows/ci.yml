name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install ".[dev]"
          pip install scanpy

      - name: Debug info
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Installed packages ==="
          pip list
          echo "=== Check test data ==="
          ls -la examples/
          echo "=== Test import py_hdWGCNA ==="
          python -c "import py_hdWGCNA; print('py_hdWGCNA imported OK')"
          echo "=== Test import scanpy ==="
          python -c "import scanpy; print('scanpy', scanpy.__version__)"
          echo "=== Test load h5ad ==="
          python -c "import scanpy as sc; adata = sc.read_h5ad('examples/test_seurat.h5ad'); print('adata shape:', adata.shape)"

      - name: Lint with ruff
        run: |
          ruff check py_hdWGCNA tests
          ruff format --check py_hdWGCNA tests

      - name: Run tests
        run: pytest tests/ -v --tb=long --cov=py_hdWGCNA --cov-report=xml --no-header

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
